name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rag-dashboard/requirements.txt
      - name: Lint Python
        run: |
          pip install ruff
          ruff check rag-dashboard/app.py
      - name: Validate Docker Compose
        run: |
          docker compose config > /dev/null
      - name: Lint shell scripts
        run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          for f in $(find scripts tests -name '*.sh' 2>/dev/null); do
            shellcheck "$f" || true
          done
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r rag-dashboard/requirements.txt
      - name: Run smoke test
        run: |
          bash tests/smoke.sh || echo 'Smoke test requires running services'
